version: 2

models:
  - name: stg_orders
    description: "Commandes nettoyées depuis la source orders"
    columns:
      - name: order_id
        description: "ID brut en INTEGER — casté en STRING dans le staging"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "ID brut en INTEGER — casté en STRING dans le staging"
        tests:
          - not_null
      - name: order_date
        tests:
          - not_null
      - name: net_sales
        tests:
          - not_null

  - name: stg_sales
    description: "Lignes de vente nettoyées depuis la source sales"
    columns:
      - name: order_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: qty
        tests:
          - not_null